<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>반응속도 테스트 게임</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .game-box {
            width: 90%;
            max-width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: #222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        #screen {
            height: 220px;
            border-radius: 18px;
            background: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px 0;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #4f7cff;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            line-height: 1.6;
        }

        .ready {
            background: #d9534f !important;
        }

        .go {
            background: #28a745 !important;
        }

        .fail {
            background: #f0ad4e !important;
        }
    </style>
</head>

<body>

    <div class="game-box">
        <h1>⚡ 반응속도 테스트</h1>
        <p>초록색으로 바뀌면 최대한 빠르게 클릭하세요.</p>

        <div id="screen">시작 버튼을 누르세요</div>

        <button id="startBtn">게임 시작</button>

        <div class="result">
            <div>현재 기록: <span id="current">-</span></div>
            <div>최고 기록: <span id="best">-</span></div>
        </div>
    </div>

    <script>
        const screen = document.getElementById("screen");
        const startBtn = document.getElementById("startBtn");
        const currentEl = document.getElementById("current");
        const bestEl = document.getElementById("best");

        let startTime = 0;
        let timer = null;
        let gameState = "idle";
        let bestScore = localStorage.getItem("bestReactionTime");

        if (bestScore) {
            bestEl.textContent = bestScore + "ms";
        }

        startBtn.addEventListener("click", startGame);
        screen.addEventListener("click", handleClick);

        function startGame() {
            clearTimeout(timer);

            gameState = "waiting";
            screen.className = "ready";
            screen.textContent = "기다리세요...";
            currentEl.textContent = "-";

            const randomDelay = Math.floor(Math.random() * 3000) + 2000;

            timer = setTimeout(() => {
                gameState = "go";
                startTime = Date.now();
                screen.className = "go";
                screen.textContent = "지금 클릭!";
            }, randomDelay);
        }

        function handleClick() {
            if (gameState === "idle") {
                return;
            }

            if (gameState === "waiting") {
                clearTimeout(timer);
                gameState = "idle";
                screen.className = "fail";
                screen.textContent = "너무 빨랐어요! 다시 시작하세요.";
                return;
            }

            if (gameState === "go") {
                const reactionTime = Date.now() - startTime;

                currentEl.textContent = reactionTime + "ms";

                if (!bestScore || reactionTime < bestScore) {
                    bestScore = reactionTime;
                    localStorage.setItem("bestReactionTime", bestScore);
                    bestEl.textContent = bestScore + "ms";
                }

                gameState = "idle";
                screen.className = "";
                screen.textContent = "다시 도전하려면 시작 버튼을 누르세요";
            }
        }
    </script>

</body>

</html>
