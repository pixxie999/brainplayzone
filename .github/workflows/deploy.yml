name: Deploy to Cloudways

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.164.61.123
          username: master_byqgfvytgg
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            git config --global --add safe.directory /home/1482947.cloudwaysapps.com/opwjxoqnte/public_html
            cd /home/1482947.cloudwaysapps.com/opwjxoqnte/public_html
            REPO_URL="https://pixxie999:${{ secrets.GH_TOKEN }}@github.com/pixxie999/brainplayzone.git"
            if [ ! -d ".git" ]; then
              git init
              git remote add origin "$REPO_URL"
            else
              git remote set-url origin "$REPO_URL"
            fi
            git fetch origin main
            git reset --hard origin/main
